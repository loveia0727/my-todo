<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My To Do List</title>
    <style>
        :root {
            --bg-base: #e6ded3;
            --cream: #f9f8f4;
            --btn-bg: #f2ede4;
            --text: #7a6f62;
            --accent: #b8a089;
        }

        /* 修正手機端的基礎設定 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-base); 
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-shell {
            width: 100%;
            max-width: 450px; /* 限制最大寬度，電腦看才不會太扁 */
            min-height: 100vh;
            background: var(--bg-base);
            position: relative;
        }

        .page { 
            position: absolute; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center;
            padding: 50px 30px; /* 增加兩側留白 */
            animation: softFade 0.5s ease;
        }
        .page.active { display: flex; }

        h1.title { 
            font-size: 2.2rem; font-weight: 300; letter-spacing: 8px; 
            margin-top: 60px; margin-bottom: 20px;
        }

        .main-card {
            background-color: var(--cream);
            width: 120%; height: 55%; /* 稍微加寬不規則塊 */
            margin-top: 10px;
            border-radius: 45% 55% 50% 50% / 35% 35% 65% 65%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .button-stack { width: 85%; display: flex; flex-direction: column; gap: 18px; margin-top: -30px; }

        /* 關鍵修正：統一所有按鈕、輸入框、下拉選單的寬度與外觀 */
        .m-btn, input, select {
            width: 100%; /* 強制填滿容器 */
            appearance: none; /* 去除手機瀏覽器預設樣式 */
            -webkit-appearance: none;
            background-color: var(--btn-bg);
            border: none; 
            padding: 18px; 
            border-radius: 30px; /* 統一圓角 */
            color: var(--text); 
            font-size: 1rem; 
            text-align: center;
            letter-spacing: 2px;
            outline: none;
        }

        /* 保存按鈕特別色 */
        .save-btn { background: var(--accent) !important; color: white !important; margin-top: 10px; }

        .m-btn { cursor: pointer; transition: 0.3s; }
        .m-btn:active { opacity: 0.7; transform: scale(0.98); }

        /* 列表樣式修正 */
        .list-container { width: 100%; margin-top: 20px; }
        .task-item {
            background: var(--cream); padding: 20px; border-radius: 25px;
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
        }
        
        .back-link { cursor: pointer; margin-bottom: 30px; align-self: flex-start; letter-spacing: 2px; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>
