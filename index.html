<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My To Do List</title>
    <style>
        :root {
            --bg-base: #e6ded3; 
            --cream: #f9f8f4;   
            --btn-bg: #f2ede4;  
            --text: #7a6f62;    
            --accent: #b8a089;  
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-base); 
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-shell {
            width: 100%; max-width: 450px; min-height: 100vh;
            background: var(--bg-base);
            position: relative;
        }

        .page { 
            position: absolute; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center;
            padding: 50px 30px; 
            animation: softFade 0.5s ease;
        }
        .page.active { display: flex; }
        @keyframes softFade { from { opacity: 0; } to { opacity: 1; } }

        h1.title { 
            font-size: 2.2rem; font-weight: 300; letter-spacing: 8px; 
            margin-top: 60px; margin-bottom: 20px; text-align: center;
        }

        .main-card {
            background-color: var(--cream);
            width: 120%; height: 55%;
            margin-top: 10px;
            border-radius: 45% 55% 50% 50% / 35% 35% 65% 65%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .button-stack { width: 85%; display: flex; flex-direction: column; gap: 18px; margin-top: -30px; }

        .m-btn, input, select {
            width: 100%;
            appearance: none; -webkit-appearance: none;
            background-color: var(--btn-bg);
            border: none; padding: 18px; border-radius: 35px;
            color: var(--text); font-size: 1rem; text-align: center;
            letter-spacing: 2px; outline: none; transition: 0.3s;
        }

        .save-btn { background: var(--accent) !important; color: white !important; margin-top: 10px; }
        .m-btn:active { opacity: 0.7; transform: scale(0.98); }

        .list-container { width: 100%; overflow-y: auto; margin-top: 20px; }
        .task-item {
            background: var(--cream); padding: 18px; border-radius: 25px;
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        
        .back-link { cursor: pointer; margin-bottom: 30px; align-self: flex-start; letter-spacing: 2px; font-size: 0.8rem; opacity: 0.6; text-decoration: none; color: inherit; }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="home" class="page active">
        <h1 class="title">TO DO LIST</h1>
        <div class="main-card">
            <div class="button-stack">
                <button class="m-btn" onclick="quickAdd()">快速創建</button>
                <button class="m-btn" onclick="showPage('create')">建立待辦事項</button>
                <button class="m-btn" onclick="showPage('list')">進入清單</button>
                <button class="m-btn" onclick="showUrgent()">近期將要到期任務</button>
            </div>
        </div>
    </div>

    <div id="create" class="page">
        <div class="back-link" onclick="showPage('home')">BACK</div>
        <h2 style="font-weight:300; letter-spacing:3px;">新目標</h2>
        <input type="text" id="tTitle" placeholder="標題">
        <input type="date" id="tDate">
        <select id="tPriority">
            <option value="3">非常重要</option>
            <option value="2">普通日常</option>
            <option value="1">隨意看看</option>
        </select>
        <button class="m-btn save-btn" onclick="handleSave()">保存</button>
    </div>

    <div id="list" class="
